name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # Main unit tests
  unit:
    runs-on: ubuntu-latest
    name: Unit Tests (Ruby ${{ matrix.ruby }})
    strategy:
      matrix:
        ruby:
          - 3.2
          - 3.3
          - 3.4
      fail-fast: false

    ##############################################
    steps:
      - uses: actions/checkout@v6
      ######
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      ######
      - name: Run RSpec
        run: bin/rspec
      ######
      - name: Run Standard
        run: bin/rake standard
    ##############################################
